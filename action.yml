name: "md-doctor"
description: "마크다운 품질 진단 — 데드 링크, 깨진 이미지, 한국어 헤딩 일관성, 토큰 효율 통계"
author: "sigco3111"

branding:
  icon: "check-circle"
  color: "blue"

inputs:
  path:
    description: "진단할 .md 파일 또는 디렉터리"
    required: true
  format:
    description: "출력 포맷 (text, json, github)"
    required: false
    default: "github"
  min-severity:
    description: "표시할 최소 심각도 (info, warning, error)"
    required: false
    default: "warning"
  fail-on:
    description: "실패로 처리할 최소 심각도 (info, warning, error, never)"
    required: false
    default: "warning"
  checks:
    description: "활성화할 검사 모듈 (콤마 구분)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install md-doctor
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install "md-doctor @ git+https://github.com/${{ github.repository }}.git@${{ github.ref_name }}"

    - name: Run md-doctor
      shell: bash
      run: |
        md-doctor "${{ inputs.path }}" \
          --format "${{ inputs.format }}" \
          --min-severity "${{ inputs.min-severity }}" \
          --fail-on "${{ inputs.fail-on }}" \
          ${{ inputs.checks != '' && format('--checks {0}', inputs.checks) || '' }}
